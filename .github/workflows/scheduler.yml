name: Auto-Publish Scheduler

on:
  schedule:
    # Run every 5 minutes — GitHub Actions minimum granularity
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  publish-due-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-publish cron
        run: |
          echo "⏰ Triggering cron at $(date -u)"
          
          HTTP_STATUS=$(curl -s --max-time 90 \
            -o /tmp/cron_response.json \
            -w "%{http_code}" \
            -X POST "https://linked-out-pro.vercel.app/api/cron/trigger")
          
          echo "📡 HTTP Status: $HTTP_STATUS"
          echo "📦 Response body:"
          cat /tmp/cron_response.json || true
          echo ""
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cron returned HTTP $HTTP_STATUS"
            exit 1
          fi
          
          echo "✅ Cron completed successfully"
