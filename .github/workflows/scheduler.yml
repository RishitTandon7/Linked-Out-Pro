name: Auto-Publish Scheduler

on:
  schedule:
    # Run every 5 minutes — GitHub Actions minimum granularity
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  publish-due-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-publish cron
        run: |
          HTTP_STATUS=$(curl -sf -o /tmp/cron_response.json -w "%{http_code}" \
            -X POST "https://linked-out-pro.vercel.app/api/cron/trigger")
          
          echo "Status: $HTTP_STATUS"
          cat /tmp/cron_response.json || true
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Cron returned status $HTTP_STATUS"
            exit 1
          fi
